name: Build and deploy Python app to Azure Web App

env:
  AZURE_WEBAPP_NAME: ai-teaching-backend
  PYTHON_VERSION: '3.11'

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest  # Back to latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Force a version of cryptography known for high compatibility
          pip install cryptography==42.0.5 --platform manylinux2014_x86_64 --only-binary=:all: --target=".python_packages/lib/site-packages"
          
          # Install the rest of the requirements
          pip install -r backend/requirements.txt --platform manylinux2014_x86_64 --only-binary=:all: --target=".python_packages/lib/site-packages"
          
          chmod +x startup.sh
          git update-index --chmod=+x startup.sh

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.git
            !.github

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}